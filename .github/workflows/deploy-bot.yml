name: Deploy Bot

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

concurrency:
  group: deploy-bot
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-1
  IMAGE_NAME: ghcr.io/shirataki2/discalendar-next-bot

jobs:
  changes:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      bot: ${{ steps.filter.outputs.bot }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            bot:
              - 'packages/bot/**'
              - 'packages/rrule-utils/**'
              - 'package-lock.json'
              - 'Dockerfile'
              - 'docker-compose.yml'
              - 'docker-compose.prod.yml'
              - 'scripts/deploy.sh'

  build-and-push:
    needs: [changes]
    if: needs.changes.outputs.bot == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (sparse)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          sparse-checkout: |
            scripts/deploy.sh
            docker-compose.prod.yml
          sparse-checkout-cone-mode: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$LIGHTSAIL_SSH_PRIVATE_KEY" > ~/.ssh/lightsail_key
          chmod 600 ~/.ssh/lightsail_key
          ssh-keyscan -H "$LIGHTSAIL_HOST" >> ~/.ssh/known_hosts
        env:
          LIGHTSAIL_SSH_PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/lightsail_key \
            -o ConnectTimeout=10 \
            "ubuntu@${LIGHTSAIL_HOST}" \
            "echo 'SSH connection successful'"
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}

      - name: Copy docker-compose.prod.yml to Lightsail
        run: |
          scp -i ~/.ssh/lightsail_key \
            docker-compose.prod.yml \
            "ubuntu@${LIGHTSAIL_HOST}:/opt/discalendar-next/docker-compose.prod.yml"
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}

      - name: Deploy application
        run: |
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh "$LIGHTSAIL_HOST"
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          SSH_KEY_PATH: ~/.ssh/lightsail_key
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          APPLICATION_ID: ${{ secrets.APPLICATION_ID }}
          INVITATION_URL: ${{ secrets.INVITATION_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          CLOUDWATCH_ACCESS_KEY_ID: ${{ secrets.CLOUDWATCH_ACCESS_KEY_ID }}
          CLOUDWATCH_SECRET_ACCESS_KEY: ${{ secrets.CLOUDWATCH_SECRET_ACCESS_KEY }}
          CLOUDWATCH_LOG_GROUP: ${{ secrets.CLOUDWATCH_LOG_GROUP }}
          AWS_REGION: ${{ env.AWS_REGION }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ env.IMAGE_NAME }}:latest
