services:
  bot:
    image: ghcr.io/shirataki2/discalendar-next-bot:latest
    container_name: discalendar-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "node", "-e", "const s=require('fs').readFileSync('/tmp/bot-healthy','utf8');const age=Date.now()-Number(s);if(isNaN(age)||age>120000)process.exit(1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: "awslogs"
      options:
        awslogs-region: "${AWS_REGION:-ap-northeast-1}"
        awslogs-group: "${AWS_CLOUDWATCH_LOG_GROUP}"
        awslogs-stream: "discalendar-bot"
        awslogs-create-group: "false"
